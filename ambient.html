<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>空間</title>

  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

  <style>
    html, body { height: 100%; margin: 0; }
    body {
      overflow:hidden;
      user-select:none;

      background:
        radial-gradient(1200px 900px at 30% 25%, rgba(255,255,255,.22), rgba(255,255,255,0) 60%),
        radial-gradient(900px 700px at 70% 65%, rgba(255,255,255,.12), rgba(255,255,255,0) 55%),
        linear-gradient(160deg, #ff2f93 0%, #ff4fb2 35%, #ff1f7a 70%, #ff5fc4 100%);
    }

    /* うっすいフィルムノイズ */
    body::before{
      content:"";
      position:fixed; inset:-20%;
      pointer-events:none;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(0,0,0,.035) 0px,
          rgba(0,0,0,.035) 1px,
          rgba(255,255,255,.02) 2px,
          rgba(255,255,255,.02) 3px
        );
      mix-blend-mode: soft-light;
      opacity:.25;
      transform: rotate(2deg);
    }

    /* 画面全体にほんのりグロー */
    body::after{
      content:"";
      position:fixed; inset:0;
      pointer-events:none;
      background: radial-gradient(800px 600px at 50% 45%, rgba(255,110,210,.28), rgba(255,110,210,0) 70%);
      filter: blur(12px);
      opacity:.8;
    }

    #stack{
      position:fixed;
      top:14px; left:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
      z-index:10;
    }

    .trigger{
      font-size:14px;
      cursor:pointer;
      color:rgba(0,0,0,.86);
      opacity:.82;
      width:34px; /* クリックしやすく */
      height:22px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      -webkit-tap-highlight-color: transparent;
      text-shadow: 0 0 10px rgba(255,255,255,.18);
    }
    .trigger.playing{ opacity:.35; }

    #log{
      position:fixed;
      bottom:10px; left:10px; right:10px;
      z-index:10;
      font:12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      background:rgba(255,255,255,.20);
      border:1px solid rgba(0,0,0,.55);
      padding:8px 10px;
      border-radius:12px;
      backdrop-filter: blur(6px);
    }
  </style>
</head>

<body>
  <div id="stack">
    <div class="trigger" data-i="0">▶︎</div>
    <div class="trigger" data-i="1">▶︎</div>
    <div class="trigger" data-i="2">▶︎</div>
  </div>

  <!-- それぞれ別トラック。好きなだけ増やせる -->
  <audio class="track" src="a.mp3" loop playsinline preload="auto"></audio>
  <audio class="track" src="b.mp3" loop playsinline preload="auto"></audio>
  <audio class="track" src="c.mp3" loop playsinline preload="auto"></audio>

  <div id="log">クリックで各レイヤーを再生/停止。重ねてOK。</div>

  <script>
    const triggers = [...document.querySelectorAll(".trigger")];
    const tracks   = [...document.querySelectorAll(".track")];
    const logEl    = document.getElementById("log");

    // 念のため
    tracks.forEach(a => { a.muted = false; a.volume = 1.0; });

    function sync(i){
      const t = triggers[i];
      const a = tracks[i];
      const playing = !a.paused;
      t.textContent = playing ? "■" : "▶︎";
      t.classList.toggle("playing", playing);
    }

async function toggle(i){
  const a = tracks[i];
  try{
    if (a.paused){
      await a.play();
    } else {
      a.pause();
    }
    sync(i);
  } catch(e){
    console.warn(e);
  }
}

    triggers.forEach(t => {
      t.addEventListener("click", () => toggle(Number(t.dataset.i)));
    });

    // 外部要因で変化してもUI同期
    tracks.forEach((a, i) => {
      a.addEventListener("play",  () => sync(i));
      a.addEventListener("pause", () => sync(i));
      sync(i);
    });
  </script>
</body>
</html>
