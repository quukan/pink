<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#ff2f93">
  <title>空間プロト</title>

  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<style>

html, body{
  height:100%;
  margin:0;
}

body{
  overflow:hidden;
  user-select:none;
  position:fixed;
  inset:0;
  background:#ff2f93;
}


/* 右下画像 */
#pinklink{
  position:fixed;
  right:40px;
  top:60%;
  transform:translateY(-50%);
  z-index:5;
}

#pinklink img{
  width:400px;
  max-width:60vw;
  height:auto;
  display:block;
}

/* トリガー群 */
#stack{
  position:fixed;
  top:14px;
  left:14px;
  display:flex;
  flex-direction:column;
  gap:4px;
  z-index:10;
}

.trigger{
  font-size:12px;
  line-height:1;
  cursor:pointer;
  color:rgba(0,0,0,.86);
  opacity:.82;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  -webkit-tap-highlight-color:transparent;
  text-shadow:0 0 10px rgba(255,255,255,.18);
  transition: color .12s ease, opacity .12s ease;
}

/* 再生中 */
.trigger.playing{
  color:#ffd6ea;
  text-shadow:0 0 14px rgba(255,255,255,.45);
}

</style>
</head>

<body>

<a href="https://akikoyamane.com" id="pinklink">
  <img src="pink.jpg" alt="pink">
</a>

<div id="stack">
  <div class="trigger" data-i="0">fridge #1</div>
  <div class="trigger" data-i="1">fridge #2</div>
  <div class="trigger" data-i="2">fridge #3</div>
</div>

<audio class="track" src="a.mp3" loop playsinline preload="auto"></audio>
<audio class="track" src="b.mp3" loop playsinline preload="auto"></audio>
<audio class="track" src="c.mp3" loop playsinline preload="auto"></audio>

<script>

const triggers = [...document.querySelectorAll(".trigger")];
const tracks   = [...document.querySelectorAll(".track")];

tracks.forEach(a=>{
  a.muted=false;
  a.volume=1.0;
});

function sync(i){
  const t=triggers[i];
  const a=tracks[i];
  t.classList.toggle("playing", !a.paused);
}

async function toggle(i){
  const a=tracks[i];
  try{
    if(a.paused){
      await a.play();
    }else{
      a.pause();
    }
    sync(i);
  }catch(e){
    console.warn(e);
  }
}

triggers.forEach(t=>{
  t.addEventListener("click",()=>toggle(Number(t.dataset.i)));
});

tracks.forEach((a,i)=>{
  a.addEventListener("play",()=>sync(i));
  a.addEventListener("pause",()=>sync(i));
  sync(i);
});

</script>
</body>
</html>
