<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#ff2f93">
  <title>空間プロト</title>

  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">


  <style>
html, body{
  height:100%;
  margin:0;
}

body{
  overflow:hidden;
  user-select:none;
  position:fixed;
  inset:0;
  background:#ff2f93; /* 最低ライン：ここだけでもピンク */
}

/* 背景を “1枚” に統合（安定最優先） */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(1200px 900px at 30% 25%, rgba(255,255,255,.22), rgba(255,255,255,0) 60%),
    radial-gradient(900px 700px at 70% 65%, rgba(255,255,255,.12), rgba(255,255,255,0) 55%),
    linear-gradient(160deg, #ff2f93 0%, #ff4fb2 35%, #ff1f7a 70%, #ff5fc4 100%),
    repeating-linear-gradient(
      0deg,
      rgba(0,0,0,.02) 0px,
      rgba(0,0,0,.02) 1px,
      rgba(255,255,255,.015) 2px,
      rgba(255,255,255,.015) 3px
    );
  opacity:1;
  filter: blur(0px); /* ここは好みで。重ければ0のまま */
}

/* 右下画像 */
#pinklink{
  position:fixed;
  right:40px;
  top:60%;
  transform:translateY(-50%);
  z-index:5;
}
#pinklink img{
  width:400px;
  max-width:60vw;
  height:auto;
  display:block;
}

/* ボタン */
#stack{
  position:fixed;
  top:14px; left:14px;
  display:flex;
  flex-direction:column;
  gap:4px;
  z-index:10;
}
.trigger{
  font-size:12px;
  width:16px;
  height:16px;
  line-height:1;
  cursor:pointer;
  color:rgba(0,0,0,.86);
  opacity:.82;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  -webkit-tap-highlight-color:transparent;
  text-shadow:0 0 10px rgba(255,255,255,.18);
}
.trigger.playing{ opacity:.35; }
    
  </style>
</head>

<body>

  <a href="https://akikoyamane.com" id="pinklink">
  <img src="pink.jpg" alt="pink">
</a>
  
  <div id="stack">
    <div class="trigger" data-i="0">▶︎</div>
    <div class="trigger" data-i="1">▶︎</div>
    <div class="trigger" data-i="2">▶︎</div>
  </div>

  <!-- それぞれ別トラック。好きなだけ増やせる -->
  <audio class="track" src="a.mp3" loop playsinline preload="auto"></audio>
  <audio class="track" src="b.mp3" loop playsinline preload="auto"></audio>
  <audio class="track" src="c.mp3" loop playsinline preload="auto"></audio>


  <script>
    const triggers = [...document.querySelectorAll(".trigger")];
    const tracks   = [...document.querySelectorAll(".track")];


    // 念のため
    tracks.forEach(a => { a.muted = false; a.volume = 1.0; });

    function sync(i){
      const t = triggers[i];
      const a = tracks[i];
      const playing = !a.paused;
      t.textContent = playing ? "■" : "▶︎";
      t.classList.toggle("playing", playing);
    }

async function toggle(i){
  const a = tracks[i];
  try{
    if (a.paused){
      await a.play();
    } else {
      a.pause();
    }
    sync(i);
  } catch(e){
    console.warn(e);
  }
}

    triggers.forEach(t => {
      t.addEventListener("click", () => toggle(Number(t.dataset.i)));
    });

    // 外部要因で変化してもUI同期
    tracks.forEach((a, i) => {
      a.addEventListener("play",  () => sync(i));
      a.addEventListener("pause", () => sync(i));
      sync(i);
    });
  </script>
</body>
</html>
